<h2 class="text 2xl font-bold mt-5">Buscar Gifs </h2>
<h3 class="text-sm text-gray-500">Buscar gifs por nombre, descripcion o tags </h3>

<section class="flex flex-col gap-4">

  <input
  type="text"
  placeholder="Buscar Gifs"
  class="mt-3 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-900 placeholder:text-slate-400 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
  (keyup.enter)="onSearch(txtSearch.value)"
  #txtSearch
  />

</section>

<section>

  <gif-list [gifs] = "gifs()" />

</section>
